<div class="form-page">
  <div class="form-header">
    <h2>{{ isEditing ? 'Editar Cuenta' : 'Nueva Cuenta' }}</h2>
  </div>

  <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">

    <div class="form-group">
      <label>ID del Cliente *</label>
      <input formControlName="clienteid" type="text" placeholder="Ej: joselema" />
      <span class="error-msg" *ngIf="isInvalid('clienteid')">ID de cliente requerido.</span>
    </div>

    <div class="form-group">
      <label>Número de Cuenta *</label>
      <input formControlName="numeroCuenta" type="text" placeholder="Ej: 478758" />
      <span class="error-msg" *ngIf="isInvalid('numeroCuenta')">Solo números, campo requerido.</span>
    </div>

    <div class="form-group">
      <label>Tipo de Cuenta *</label>
      <select formControlName="tipoCuenta">
        <option value="Ahorros">Ahorros</option>
        <option value="Corriente">Corriente</option>
      </select>
    </div>

    <div class="form-group">
      <label>Saldo Inicial *</label>
      <input formControlName="saldoInicial" type="number" step="0.01" min="0" />
      <span class="error-msg" *ngIf="isInvalid('saldoInicial')">Saldo inicial mínimo es 0.</span>
    </div>

    <div class="form-group inline-check">
      <label>
        <input formControlName="estado" type="checkbox" />
        Cuenta activa
      </label>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Crear Cuenta') }}
      </button>
    </div>

  </form>
</div>
