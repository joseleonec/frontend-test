<div class="form-page">
  <div class="form-header">
    <h2>Registrar Movimiento</h2>
    <button class="btn-secondary" (click)="verLista()">Ver Lista</button>
  </div>

  <div *ngIf="errorMessage" class="alert error">
    <strong>Error:</strong> {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="alert success">
    {{ successMessage }}
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">

    <div class="form-group">
      <label>ID de Cuenta *</label>
      <input formControlName="cuentaId" type="number" placeholder="Ej: 1" />
      <span class="error-msg" *ngIf="isInvalid('cuentaId')">ID de cuenta numérico es requerido.</span>
    </div>

    <div class="form-group">
      <label>Tipo de Movimiento *</label>
      <select formControlName="tipoMovimiento">
        <option value="CREDITO">Crédito (Depósito)</option>
        <option value="DEBITO">Débito (Retiro)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Valor *</label>
      <input formControlName="valor" type="number" step="0.01" min="0.01" placeholder="Ej: 500.00" />
      <span class="error-msg" *ngIf="isInvalid('valor')">Valor positivo mayor a 0 es requerido.</span>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Procesando...' : 'Registrar Movimiento' }}
      </button>
    </div>

  </form>
</div>
