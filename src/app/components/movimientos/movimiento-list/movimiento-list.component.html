<div class="page-header">
  <h2>Movimientos</h2>
  <button class="btn-primary" (click)="nuevo()">+ Nuevo Movimiento</button>
</div>

<div class="search-bar">
  <input [(ngModel)]="filterText" placeholder="Buscar movimiento..." />
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Nro. Cuenta</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Saldo</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let m of filtered">
        <td>{{ m.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
        <td>{{ m.numeroCuenta }}</td>
        <td>
          <span [class]="m.tipoMovimiento === 'CREDITO' ? 'badge credito' : 'badge debito'">
            {{ m.tipoMovimiento }}
          </span>
        </td>
        <td [class]="m.valor >= 0 ? 'amount positive' : 'amount negative'">
          {{ m.valor | number:'1.2-2' }}
        </td>
        <td>{{ m.saldo | number:'1.2-2' }}</td>
        <td class="actions">
          <button class="btn-delete" (click)="eliminar(m.id)">Eliminar</button>
        </td>
      </tr>
      <tr *ngIf="filtered.length === 0">
        <td colspan="6" class="empty">No hay movimientos registrados.</td>
      </tr>
    </tbody>
  </table>
</div>
