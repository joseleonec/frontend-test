<div class="form-page">
  <div class="form-header">
    <h2>{{ isEditing ? 'Editar Cliente' : 'Nuevo Cliente' }}</h2>
  </div>

  <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">

    <div class="form-row">
      <div class="form-group">
        <label>Nombre *</label>
        <input formControlName="nombre" type="text" placeholder="Ej: Juan Pérez" />
        <span class="error-msg" *ngIf="isInvalid('nombre')">Nombre es requerido (máx. 100 caracteres).</span>
      </div>
      <div class="form-group">
        <label>Género *</label>
        <select formControlName="genero">
          <option value="">Seleccionar...</option>
          <option value="Masculino">Masculino</option>
          <option value="Femenino">Femenino</option>
          <option value="Otro">Otro</option>
        </select>
        <span class="error-msg" *ngIf="isInvalid('genero')">Género es requerido.</span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Edad *</label>
        <input formControlName="edad" type="number" min="0" max="150" />
        <span class="error-msg" *ngIf="isInvalid('edad')">Edad válida es requerida (0–150).</span>
      </div>
      <div class="form-group">
        <label>Identificación *</label>
        <input formControlName="identificacion" type="text" placeholder="Ej: 1234567890" />
        <span class="error-msg" *ngIf="isInvalid('identificacion')">Identificación es requerida.</span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Dirección</label>
        <input formControlName="direccion" type="text" placeholder="Ej: Calle Principal 123" />
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input formControlName="telefono" type="text" placeholder="Ej: 0991234567" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Cliente ID *</label>
        <input formControlName="clienteid" type="text" placeholder="Ej: juanperez01" />
        <span class="error-msg" *ngIf="isInvalid('clienteid')">Cliente ID es requerido.</span>
      </div>
      <div class="form-group">
        <label>Contraseña {{ isEditing ? '' : '*' }}</label>
        <input formControlName="contrasena" type="password" placeholder="{{ isEditing ? 'Dejar vacío para mantener' : 'Mínimo 4 caracteres' }}" />
        <span class="error-msg" *ngIf="isInvalid('contrasena')">Contraseña mínima de 4 caracteres.</span>
      </div>
    </div>

    <div class="form-group inline-check">
      <label>
        <input formControlName="estado" type="checkbox" />
        Cliente activo
      </label>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
      <button type="submit" class="btn-primary" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Crear Cliente') }}
      </button>
    </div>

  </form>
</div>
